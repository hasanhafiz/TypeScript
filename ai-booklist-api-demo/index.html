<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="header-title">Book Catalog</h1>
            <p class="header-subtitle">Explore our collection of books</p>
        </div>
    </header>

    <main class="container">
        <div id="book-catalog" class="row g-4">
            <div class="col-12">
                <div class="loading-spinner text-center my-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading books...</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="error-message" class="error-message d-none">
            <div class="alert alert-danger" role="alert">
                Failed to load books. Please try again later.
            </div>
        </div>
    </main>

    <footer class="footer mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0">Book Catalog Demo</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div class="modal fade" id="bookModal" tabindex="-1" aria-labelledby="bookModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="bookModalLabel">Book Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modalBookDetails"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
