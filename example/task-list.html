<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Task List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f1f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .task-card {
      max-width: 480px;
      margin: 60px auto;
      border-radius: 16px;
      border: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .task-card .card-body {
      padding: 2rem;
    }

    .task-title {
      font-weight: 700;
      font-size: 1.5rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #6c757d;
    }

    .btn-add {
      background-color: #212529;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-add:hover {
      background-color: #000;
      color: #fff;
    }

    .task-input {
      border-radius: 8px;
      border: 1px solid #dee2e6;
    }

    .task-item {
      background-color: #f8f9fa;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .task-item .form-check-input {
      width: 1.15em;
      height: 1.15em;
      margin-top: 0;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #adb5bd;
    }

    .task-text {
      font-size: 0.95rem;
      color: #212529;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card task-card">
      <div class="card-body">
        <h1 class="task-title text-center mb-4">My Task List</h1>

        <div class="mb-4">
          <p class="section-label mb-2">ADD A TASK</p>
          <div class="d-flex gap-2">
            <input type="text" class="form-control task-input" placeholder="Enter a new task">
            <button type="button" class="btn btn-add px-3">Add Task</button>
          </div>
        </div>

        <div>
          <p class="section-label mb-2">TASKS</p>
          <div class="d-flex flex-column gap-2">

            <div class="task-item completed">
              <input class="form-check-input" type="checkbox" checked>
              <span class="task-text">Buy groceries</span>
            </div>

            <div class="task-item">
              <input class="form-check-input" type="checkbox">
              <span class="task-text">Finish TypeScript homework</span>
            </div>

            <div class="task-item">
              <input class="form-check-input" type="checkbox">
              <span class="task-text">Call the dentist</span>
            </div>

            <div class="task-item completed">
              <input class="form-check-input" type="checkbox" checked>
              <span class="task-text">Water the plants</span>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('.task-item .form-check-input').forEach(cb => {
      cb.addEventListener('change', function () {
        this.closest('.task-item').classList.toggle('completed', this.checked);
      });
    });
  </script>

</body>

</html>
